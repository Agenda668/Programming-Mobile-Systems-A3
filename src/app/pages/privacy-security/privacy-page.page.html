<app-page-shell title="隐私安全">
  <ion-card>
    <ion-card-header>
      <ion-card-title>隐私与安全说明</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item>
          <ion-label>
            <h3>最小化数据收集</h3>
            <p>应用仅保存库存管理所需信息，不收集额外个人隐私数据。</p>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <h3>安全接口访问</h3>
            <p>所有库存数据通过 REST 接口访问，避免在页面中硬编码敏感信息。</p>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <h3>输入验证</h3>
            <p>所有新增与修改操作都应进行必填与格式校验，防止异常输入和错误数据写入。</p>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <h3>删除约束</h3>
            <p>系统保留关键样本数据，例如 Laptop，避免测试数据被误删。</p>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <h3>提示与确认</h3>
            <p>重要操作需要清晰提示，减少误操作风险，提高移动端使用安全性。</p>
          </ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>
</app-page-shell>
